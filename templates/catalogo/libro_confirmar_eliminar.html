{% extends 'base.html' %}
{% block title %}Eliminar Libro{% endblock %}
{% block page_title %}Confirmar eliminación{% endblock %}

{% block content %}
<div class="card p-4" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
    <h5 class="mt-3 fw-bold">¿Eliminar "{{ libro.titulo }}"?</h5>
    <p class="text-muted">Esta acción no se puede deshacer.</p>
    <form method="post" class="d-flex gap-2 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-2"></i>Sí, eliminar
        </button>
        <a href="{% url 'catalogo:libro_detalle' libro.pk %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
