<!-- templates/dashboard/index.html -->
{% extends 'base.html' %}
{% block title %}Dashboard{% endblock %}
{% block page_title %}Panel de Control{% endblock %}

{% block content %}
<div class="text-center py-5">
    <i class="bi bi-speedometer2 text-primary" style="font-size: 4rem;"></i>
    <h3 class="mt-3">¡Bienvenido/a, {{ user.first_name }}!</h3>
    <p class="text-muted">Panel de administración de la Biblioteca Digital.</p>
    <p class="badge bg-{% if user.es_bibliotecario %}primary{% else %}secondary{% endif %} fs-6">
        {{ user.get_rol_display }}
    </p>
</div>
{% endblock %}
