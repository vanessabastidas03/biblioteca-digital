<!-- templates/accounts/login.html -->
{% extends 'base.html' %}

{% block public_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);">
    <div class="card p-4" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <i class="bi bi-book-half text-primary" style="font-size: 3rem;"></i>
            <h3 class="mt-2 fw-bold">Biblioteca Digital</h3>
            <p class="text-muted">Inicia sesión para continuar</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar sesión
            </button>
        </form>

        <hr>
        <p class="text-center text-muted mb-0">
            ¿No tienes cuenta?
            <a href="{% url 'accounts:registro' %}" class="fw-bold">Regístrate aquí</a>
        </p>
    </div>
</div>
{% endblock %}
