{% extends 'base.html' %}
{% block title %}Eliminar Autor{% endblock %}
{% block page_title %}Confirmar eliminación{% endblock %}

{% block content %}
<div class="card p-4" style="max-width:500px; margin:0 auto; text-align:center;">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
    <h5 class="mt-3">¿Eliminar autor "{{ autor }}"?</h5>
    <form method="post" class="d-flex gap-2 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'catalogo:autor_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
