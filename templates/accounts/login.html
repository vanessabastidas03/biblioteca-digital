<!-- templates/accounts/login.html -->
{% extends 'base.html' %}

{% block public_content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="card p-4 p-md-5 shadow-lg">
            <div class="text-center mb-4">
                <i class="bi bi-book-half login-icon" style="font-size: 3.5rem;"></i>
                <h3 class="mt-3 fw-bold" style="color:#5c3d2e;">Biblioteca Digital</h3>
                <p class="text-muted small">Inicia sesión para continuar</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-uppercase" style="color:#5c3d2e; letter-spacing:.5px;">
                        <i class="bi bi-person me-1"></i>Usuario
                    </label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-uppercase" style="color:#5c3d2e; letter-spacing:.5px;">
                        <i class="bi bi-lock me-1"></i>Contraseña
                    </label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar sesión
                </button>
            </form>

            <hr class="my-4" style="border-color: rgba(92,61,46,0.15);">
            <p class="text-center text-muted mb-0 small">
                ¿No tienes cuenta?
                <a href="{% url 'accounts:registro' %}" class="fw-bold" style="color:#c9a84c;">Regístrate aquí</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
