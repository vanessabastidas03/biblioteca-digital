<!-- templates/accounts/login.html -->
{% extends 'base.html' %}

{% block public_content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-book-half login-icon" style="font-size: 3.5rem; color: #4A90D9;"></i>
                <h3 class="mt-3 fw-bold" style="color:#2F3A4A;">Biblioteca Digital</h3>
                <p style="color:#6B7280; font-size:.88rem;">Inicia sesión para continuar</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person me-1"></i>Usuario
                    </label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-lock me-1"></i>Contraseña
                    </label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar sesión
                </button>
            </form>

            <hr class="my-4" style="border-color: var(--borde, #E5E7EB);">
            <p class="text-center mb-0" style="font-size:.88rem; color:#6B7280;">
                ¿No tienes cuenta?
                <a href="{% url 'accounts:registro' %}" class="fw-bold" style="color:#4A90D9;">Regístrate aquí</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
