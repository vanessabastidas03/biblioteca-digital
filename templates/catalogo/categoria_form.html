{% extends 'base.html' %}
{% block title %}{{ accion }} Categoría{% endblock %}
{% block page_title %}{{ accion }} Categoría{% endblock %}

{% block content %}
<div class="card p-4" style="max-width:500px; margin:0 auto;">
    <h5 class="fw-bold mb-4"><i class="bi bi-tag me-2 text-primary"></i>{{ accion }} Categoría</h5>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">Nombre *</label>{{ form.nombre }}
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Descripción</label>{{ form.descripcion }}
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Color</label>{{ form.color }}
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save me-2"></i>{{ accion }}
            </button>
            <a href="{% url 'catalogo:categoria_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
